<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <style>
    .logo-ring {
      fill: none;
      stroke: #0A0A0A;
      stroke-width: 2;
    }
    .logo-line {
      stroke: #0A0A0A;
      stroke-width: 3;
      stroke-linecap: round;
    }
    .logo-base {
      stroke: #0A0A0A;
      stroke-width: 2;
      opacity: 0.4;
    }
    .logo-dot {
      fill: #E03A3A;
    }
    @media (prefers-color-scheme: dark) {
      .logo-ring {
        stroke: #FFFFFF;
      }
      .logo-line {
        stroke: #FFFFFF;
      }
      .logo-base {
        stroke: #FFFFFF;
      }
    }
  </style>
  <circle cx="60" cy="60" r="54" class="logo-ring" />
  <line x1="22" y1="100" x2="60" y2="16" class="logo-line" />
  <line x1="98" y1="100" x2="60" y2="16" class="logo-line" />
  <line x1="22" y1="100" x2="98" y2="100" class="logo-base" />
  <circle cx="60" cy="16" r="12" class="logo-dot" />
</svg>
